# Render Blueprint for the FastAPI backend.
# Deploy: push this repo, then on render.com -> New -> Blueprint -> pick this repo.
# Render reads this file, creates the Postgres DB + web service, and wires DATABASE_URL.
# You must set OPENAI_API_KEY manually in the dashboard (it is marked sync:false).
databases:
  - name: unaid-db
    plan: free
    databaseName: unaid
    user: unaid

services:
  - type: web
    name: un-aid-intelligence-platform-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: unaid-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: DATA_FILE
        value: ./merged_data_small.csv.gz
      # Set this secret in the Render dashboard (Environment tab) after the first deploy.
      - key: OPENAI_API_KEY
        sync: false
