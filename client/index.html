<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="UN Aid Intelligence Platform - AI-powered analytics for international development aid flows using real UN data (2015-2024). Features interactive world maps, forecasting, and conversational AI." />
    <meta name="keywords" content="UN, aid, development, analytics, AI, forecasting, international development, humanitarian aid" />
    <meta name="author" content="UN Aid Intelligence Platform" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="UN Aid Intelligence Platform - AI-Powered Development Analytics" />
    <meta property="og:description" content="Advanced analytics platform leveraging real UN aid data with AI-powered forecasting and conversational intelligence for informed development decision-making." />
    <meta property="og:site_name" content="UN Aid Intelligence Platform" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="UN Aid Intelligence Platform" />
    <meta property="twitter:description" content="AI-powered analytics for international development aid flows" />
    
    <!-- Favicon: vector UN-blue globe (renders crisply at every size) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23009EDB'/><g fill='none' stroke='white' stroke-width='2.5'><circle cx='32' cy='32' r='18'/><ellipse cx='32' cy='32' rx='7.5' ry='18'/><line x1='14' y1='32' x2='50' y2='32'/><path d='M17 22 H47 M17 42 H47'/></g></svg>" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- External CDN Resources -->
    <!-- MapLibre GL: open-source, token-free drop-in for Mapbox GL -->
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    
    <title>UN Aid Intelligence Platform - AI-Powered Development Analytics</title>
    <!-- Force cache refresh -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- External Scripts (loaded async for performance) -->
    <script async src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script async src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
