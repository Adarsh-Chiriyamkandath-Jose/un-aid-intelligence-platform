name: Keep backend warm

# Render's free tier spins the API down after ~15 minutes of inactivity, which
# causes a slow cold start (or a transient 502) on the next request. This pings
# the health endpoint on a schedule so the service stays awake during the day.
on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs under load.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
              https://un-aid-intelligence-platform-api.onrender.com/api/health || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "Health check did not return 200 after retries (service may be cold-starting)."
